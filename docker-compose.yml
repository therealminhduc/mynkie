# Reference for integrating mynkie into an existing homelab docker-compose stack.
# The homelab stack should serve the static site extracted by homelab/scripts/deploy.sh.
#
# To apply: set MYNKIE_SITE_DIR in homelab/.env, then run homelab/scripts/deploy.sh.

services:
  mynkie-site:
    image: ghcr.io/therealminhduc/mynkie:latest
    container_name: mynkie-site
    restart: "no"
    volumes:
      - ${MYNKIE_SITE_DIR:-./data/mynkie-site}:/site
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        release_id="$$(date -u +%Y%m%d%H%M%S)"
        release_dir="/site/releases/$$release_id"
        mkdir -p "$$release_dir"
        cp -a /usr/share/nginx/html/. "$$release_dir/"
        ln -sfn "releases/$$release_id" /site/current

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --include-stopped --revive-stopped mynkie-site
