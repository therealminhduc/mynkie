server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /404.html {
        internal;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/pdf;
    gzip_min_length 1024;
}
